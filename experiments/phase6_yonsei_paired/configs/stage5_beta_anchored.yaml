# Phase 6 Stage 5 — DualBeta + Beta-anchored aux loss (calibration to Yonsei)
# Main paper claim: Beta r ↔ external rater agreement
seed: 42
paths:
  train_csv: "/home/ajy/AU-RegionFormer/experiments/phase6_yonsei_paired/csvs/master_train.csv"
  val_csv:   "/home/ajy/AU-RegionFormer/experiments/phase6_yonsei_paired/csvs/master_val.csv"
  output_dir: "/mnt/hdd/ajy_25/results/phase6_stage5_beta_anchored"
model:
  version: "v2"
  pretrained: true
  d_emb: 384
  n_heads: 8
  n_fusion_layers: 1
  dropout: 0.1
  gate_init: 0.0
  num_classes: 4
  head_dropout: 0.2
  v2:
    global_encoder: "mobilenetv4_conv_medium"
    patch_encoder: "mobilenetv4_conv_small"
    patch_size: 96
    use_stage_a: false
    use_stage_b: true
    use_iso: true
    use_rel: true
    combine: "weighted"
    tau_init: 2.0
    tau_end: 1.0
training:
  epochs: 30
  batch_size: 256
  num_workers: 12
  optimizer: "adamw"
  base_lr: 7e-4
  weight_decay: 0.05
  scheduler: "cosine_warmup"
  warmup_ratio: 0.05
  min_lr: 1e-6
  loss: "focal"
  focal_gamma: 2.0
  freeze_backbone_epochs: 2
  backbone_lr_scale: 0.1
  grad_clip_norm: 5.0
  amp: true
  early_stop_patience: 5
  save_every: 10
  metric: "f1_macro"
  beta_anchor_weight: 2.0   # MSE(mean(r), quality) — bumped from 0.5 to match focal-loss scale
  beta_var_weight: 0.5      # diversity: 1 - 4*var(r) clamped — prevent trivial r=const collapse
augmentation:
  global_img_size: 224
  normalize: "from_model"
