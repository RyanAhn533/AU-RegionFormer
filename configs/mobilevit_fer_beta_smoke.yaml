# ─── Beta L2 Smoke Test (2 epochs, small batch) ───
# Validates gradient flow + reliability values end-to-end.

seed: 42

paths:
  raw_train: "/home/ajy/AI_hub_250704/data2/data_processed_korea"
  raw_val: "/home/ajy/AI_hub_250704/data2/data_processed_korea_validation"
  csv_dir: "/mnt/hdd/ajy_25/au_csv"
  train_csv: "/mnt/hdd/ajy_25/au_csv/index_train.csv"
  val_csv: "/mnt/hdd/ajy_25/au_csv/index_val.csv"
  output_dir: "/mnt/hdd/ajy_25/results/mobilevit_fer_beta_smoke_sm"

preprocess:
  work_short_side: 800
  workers: 12

model:
  backbone: "mobilevitv2_100"
  pretrained: true
  d_emb: 384
  roi_mode: "bilinear"
  roi_spatial: 1
  n_heads: 8
  n_fusion_layers: 1
  dropout: 0.1
  gate_init: 0.0
  num_classes: 7
  head_dropout: 0.2

  use_beta: true
  beta:
    use_l2: true
    l2_mode: "softmax"
    use_l3: false
    tau_init: 2.0
    tau_end: 1.0

training:
  epochs: 2
  batch_size: 32
  num_workers: 4

  optimizer: "adamw"
  base_lr: 3e-4
  weight_decay: 0.05
  scheduler: "cosine_warmup"
  warmup_ratio: 0.05
  min_lr: 1e-6
  loss: "focal"
  focal_gamma: 2.0
  label_smoothing: 0.0
  freeze_backbone_epochs: 1
  backbone_lr_scale: 0.1
  grad_clip_norm: 5.0
  amp: true
  save_every: 10
  metric: "f1_macro"

augmentation:
  global_img_size: 224
  normalize: "from_model"
