# 4감정 필터링 후 (Before) — 비교 실험용
seed: 42

paths:
  train_csv: "/home/ajy/AU-RegionFormer/data/4emotion_comparison/train_after.csv"
  val_csv: "/home/ajy/AU-RegionFormer/data/4emotion_comparison/val_4emo.csv"
  output_dir: "/home/ajy/AU-RegionFormer/outputs/4emo_after"

model:
  backbone: "mobilevitv2_150"
  pretrained: true
  d_emb: 384
  roi_mode: "bilinear"
  roi_spatial: 1
  n_heads: 8
  n_fusion_layers: 2
  dropout: 0.1
  gate_init: 0.0
  drop_path: 0.0
  num_classes: 4
  head_dropout: 0.2

training:
  epochs: 50
  batch_size: 32
  num_workers: 4
  optimizer: "adamw"
  base_lr: 3e-4
  weight_decay: 0.05
  scheduler: "cosine_warmup"
  warmup_ratio: 0.05
  min_lr: 1e-6
  loss: "focal"
  focal_gamma: 2.0
  label_smoothing: 0.0
  freeze_backbone_epochs: 3
  backbone_lr_scale: 0.1
  grad_clip_norm: 5.0
  mixup_alpha: 0.0
  amp: true
  ema: false
  early_stop_patience: 15
  save_every: 10
  metric: "f1_macro"

augmentation:
  global_img_size: 224
  normalize: "from_model"
